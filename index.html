<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Bubu & Dudu Diary 📅</title>
    <style>
        :root {
            --bg: #fffaf0;
            --dudu-brown: #5d4037;
            --bubu-pink: #ffdae9;
            --accent-yellow: #fff9c4;
            --soft-white: #ffffff;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: var(--dudu-brown); 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }

        /* Header */
        .header img { 
            width: 100%; 
            max-width: 300px; 
            border-radius: 20px; 
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.6rem; margin: 10px 0 5px; }
        p { font-size: 0.9rem; margin-bottom: 25px; opacity: 0.8; }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            max-width: 450px;
            margin: 0 auto;
        }

        .day-box {
            background: var(--soft-white);
            border: 2px solid var(--bubu-pink);
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .day-box:hover { 
            background: var(--accent-yellow); 
            transform: scale(1.1);
            border-color: var(--dudu-brown);
        }

        /* Modal Overlay */
        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(93, 64, 55, 0.5); 
            backdrop-filter: blur(4px);
            z-index: 99; 
        }

        /* Pop-up Box */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 350px;
            background: var(--soft-white);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 100;
            border: 3px solid var(--bubu-pink);
        }

        /* Character Toggle Icons */
        .char-toggle { 
            display: flex; 
            justify-content: space-around; 
            margin: 20px 0; 
            background: #fdf2f5;
            padding: 15px;
            border-radius: 20px;
        }

        .char-btn { 
            text-align: center; 
            cursor: pointer; 
            opacity: 0.4; 
            transition: 0.3s;
            flex: 1;
        }

        .char-btn.active { opacity: 1; }

        .char-icon { 
            width: 75px; 
            height: 75px; 
            object-fit: cover; /* Ensures PNG fits circle */
            border-radius: 50%; 
            margin-bottom: 8px;
            background: white;
            border: 3px solid transparent;
            transition: 0.3s;
        }

        .char-btn.active .char-icon { 
            border-color: var(--dudu-brown); 
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Text Input */
        textarea { 
            width: 100%; 
            height: 140px; 
            border-radius: 15px; 
            border: 2px solid var(--bubu-pink); 
            padding: 15px; 
            font-family: inherit; 
            font-size: 1rem;
            background: #fff;
            box-sizing: border-box;
            resize: none;
            outline: none;
            color: var(--dudu-brown);
        }

        .save-btn { 
            background: var(--bubu-pink); 
            color: var(--dudu-brown);
            border: none; 
            padding: 15px; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            width: 100%;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 #f48fb1;
            transition: 0.1s;
        }

        .save-btn:active { 
            transform: translateY(3px); 
            box-shadow: 0 1px 0 #f48fb1;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="dudu_gifts_setup.png" alt="Bubu & Dudu">
        <h1>Bubu & Dudu Diary ✨</h1>
        <p>Our shared space for happy memories.</p>
    </div>

    <div class="calendar-grid" id="calendar"></div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    
    <div class="modal" id="modal">
        <h2 id="modal-date">Day X</h2>
        
        <div class="char-toggle">
            <div class="char-btn active" id="dudu-tab" onclick="switchUser('dudu')">
                <img src="dudu_avatar.png" class="char-icon">
                <div style="font-weight: bold; font-size: 0.9rem;">Dudu</div>
            </div>
            <div class="char-btn" id="bubu-tab" onclick="switchUser('bubu')">
                <img src="bubu_avatar.png" class="char-icon">
                <div style="font-weight: bold; font-size: 0.9rem;">Bubu</div>
            </div>
        </div>

        <textarea id="note-input" placeholder="Type a sweet note..."></textarea>
        <button class="save-btn" onclick="saveNote()">Save Forever ❤️</button>
    </div>

    <script>
        // YOUR FIREBASE CONNECTION
        const FIREBASE_URL = "https://bubudududiary-ac774-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let currentDay = null;
        let currentUser = 'dudu';

        // 1. Setup the Calendar
        const grid = document.getElementById('calendar');
        for (let i = 1; i <= 31; i++) {
            let div = document.createElement('div');
            div.className = 'day-box';
            div.innerText = i;
            div.onclick = () => openModal(i);
            grid.appendChild(div);
        }

        // 2. Open Modal Logic
        async function openModal(day) {
            currentDay = day;
            document.getElementById('modal-date').innerText = "March " + day;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            loadNote();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // 3. Switch between Dudu and Bubu
        function switchUser(user) {
            currentUser = user;
            document.getElementById('dudu-tab').classList.toggle('active', user === 'dudu');
            document.getElementById('bubu-tab').classList.toggle('active', user === 'bubu');
            loadNote();
        }

        // 4. Firebase Save
        async function saveNote() {
            const btn = document.querySelector('.save-btn');
            const text = document.getElementById('note-input').value;
            const url = `${FIREBASE_URL}/days/${currentDay}/${currentUser}.json`;
            
            btn.innerText = "Saving...";
            try {
                await fetch(url, { method: 'PUT', body: JSON.stringify(text) });
                btn.innerText = "Saved! ✨";
                setTimeout(() => { btn.innerText = "Save Forever ❤️"; }, 2000);
            } catch (e) {
                alert("Error saving! Check your connection.");
                btn.innerText = "Save Forever ❤️";
            }
        }

        // 5. Firebase Load
        async function loadNote() {
            const input = document.getElementById('note-input');
            input.value = "Loading...";
            const url = `${FIREBASE_URL}/days/${currentDay}/${currentUser}.json`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                input.value = data || "";
            } catch (e) {
                input.value = "";
            }
        }
    </script>
</body>
</html>
